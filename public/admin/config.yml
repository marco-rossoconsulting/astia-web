backend:
  name: github
  repo: marcorosso-labs/Astia-Web-Site
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: oauth/auth

media_folder: "public/images"
public_folder: "/images"

site_url: https://astiaweb.netlify.app
display_url: https://astiaweb.netlify.app
logo_url: https://astiaweb.netlify.app/favicon.svg

i18n:
  locales: [en, de, it]
  default_locale: en
  structure: single_file

publish_mode: simple
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  # ============================================================================
  # PAGES — raw object structure matching the JSON exactly (NO i18n field magic)
  # ============================================================================
  - name: pages
    label: "Pages"
    label_singular: "Page"
    editor:
      preview: false
    files:
      - name: journal-index
        label: "Journal Index Page"
        file: src/content/pages/journal-index.json
        fields:
          - label: "SEO"
            name: seo
            widget: object
            fields:
              - label: "Meta Title"
                name: title
                widget: object
                fields:
                  - { label: "English", name: en, widget: string }
                  - { label: "German",  name: de, widget: string }
                  - { label: "Italian", name: it, widget: string }
              - label: "Meta Description"
                name: description
                widget: object
                fields:
                  - { label: "English", name: en, widget: text }
                  - { label: "German",  name: de, widget: text }
                  - { label: "Italian", name: it, widget: text }
              - { label: "OG Image", name: ogImage, widget: image, required: false }
              - label: "OG Image Alt Text"
                name: ogImageAlt
                widget: object
                required: false
                fields:
                  - { label: "English", name: en, widget: string }
                  - { label: "German",  name: de, widget: string }
                  - { label: "Italian", name: it, widget: string }
          - label: "Hero"
            name: hero
            widget: object
            fields:
              - label: "Eyebrow"
                name: eyebrow
                widget: object
                fields:
                  - { label: "English", name: en, widget: string }
                  - { label: "German",  name: de, widget: string }
                  - { label: "Italian", name: it, widget: string }
              - label: "Title"
                name: titlePre
                widget: object
                fields:
                  - { label: "English", name: en, widget: string }
                  - { label: "German",  name: de, widget: string }
                  - { label: "Italian", name: it, widget: string }
              - label: "Lede"
                name: lede
                widget: object
                fields:
                  - { label: "English", name: en, widget: text }
                  - { label: "German",  name: de, widget: text }
                  - { label: "Italian", name: it, widget: text }
          - label: "Labels"
            name: labels
            widget: object
            fields:
              - label: "Read more"
                name: readMore
                widget: object
                fields:
                  - { label: "English", name: en, widget: string }
                  - { label: "German",  name: de, widget: string }
                  - { label: "Italian", name: it, widget: string }
              - label: "Back to Journal"
                name: backToJournal
                widget: object
                fields:
                  - { label: "English", name: en, widget: string }
                  - { label: "German",  name: de, widget: string }
                  - { label: "Italian", name: it, widget: string }
              - label: "Translation note"
                name: translationNote
                widget: object
                required: false
                fields:
                  - { label: "English", name: en, widget: text }
                  - { label: "German",  name: de, widget: text }
                  - { label: "Italian", name: it, widget: text }

  # ============================================================================
  # ARTICLES
  # ============================================================================
  - name: articles
    label: "Journal Articles"
    label_singular: "Article"
    folder: src/content/articles
    create: true
    delete: true
    identifier_field: route
    extension: md
    format: yaml-frontmatter
    summary: "{{title}} · {{lang}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "URL Route", name: route, widget: string }
      - { label: "Language", name: lang, widget: select, options: ["en", "de", "it"], default: "en" }
      - { label: "Excerpt", name: excerpt, widget: text }
      - { label: "Tag", name: tag, widget: string }
      - { label: "Date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Reading time", name: readingTime, widget: string, default: "5 min" }
      - { label: "Published", name: published, widget: boolean, default: true }
      - label: "SEO"
        name: seo
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: "Meta Title", name: title, widget: string, required: false }
          - { label: "Meta Description", name: description, widget: text, required: false }
      - { label: "Body", name: body, widget: markdown }
