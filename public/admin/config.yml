            widget: object
            collapsed: true
            fields:
              - { label: "Section number", name: num, widget: string, i18n: true }
              - { label: "Headline — pre-italic", name: h2pre, widget: string, i18n: true }
              - { label: "Headline — italic", name: h2em, widget: string, i18n: true }
              - label: "Add-on items"
                name: items
                widget: list
                summary: "{{fields.title.en}}"
                fields:
                  - { label: "Title", name: title, widget: string, i18n: true }
                  - { label: "Body", name: body, widget: text, i18n: true }
                  - { label: "Price", name: price, widget: string, i18n: true }
          - label: "FAQ"
            name: faq
            widget: object
            collapsed: true
            fields:
              - { label: "Section number", name: num, widget: string, i18n: true }
              - { label: "Headline — pre-italic", name: h2pre, widget: string, i18n: true }
              - { label: "Headline — italic", name: h2em, widget: string, i18n: true }
              - label: "FAQ items"
                name: items
                widget: list
                summary: "{{fields.q.en}}"
                fields:
                  - { label: "Question", name: q, widget: string, i18n: true }
                  - { label: "Answer", name: a, widget: text, i18n: true }

      # ----- APPLY -----
      - name: apply
        label: "Apply Page"
        file: src/content/pages/apply.json
        i18n: true
        fields:
          - label: "SEO"
            name: seo
            widget: object
            collapsed: true
            fields:
              - { label: "Meta Title", name: title, widget: string, i18n: true }
              - { label: "Meta Description", name: description, widget: text, i18n: true }
              - { label: "OG Image", name: ogImage, widget: image, required: false, i18n: duplicate }
              - { label: "OG Image Alt Text", name: ogImageAlt, widget: string, required: false, i18n: true }
          - label: "Hero"
            name: hero
            widget: object
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string, i18n: true }
              - { label: "Headline — pre-italic", name: headlinePre, widget: string, i18n: true }
              - { label: "Headline — italic", name: headlineEm, widget: string, i18n: true }
              - { label: "Headline — post-italic", name: headlinePost, widget: string, i18n: true }
              - { label: "Lede", name: lede, widget: text, i18n: true }
              - { label: "Subnote (small text below lede)", name: subnote, widget: text, i18n: true }
          - label: "Form (labels & options)"
            name: form
            widget: object
            collapsed: true
            hint: "These are the labels shown on the form. Change the field structure in the codebase if needed."
            fields:
              - label: "Section titles"
                name: sections
                widget: object
                fields:
                  - { label: "Property section", name: property, widget: string, i18n: true }
                  - { label: "What's broken section", name: broken, widget: string, i18n: true }
                  - { label: "You section", name: you, widget: string, i18n: true }
              - { label: "Submit button text", name: submit, widget: string, i18n: true }
              - { label: "Optional label", name: optional, widget: string, i18n: true }
          - label: "Thank-you page"
            name: thankYou
            widget: object
            collapsed: true
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string, i18n: true }
              - { label: "Thank you text", name: thanks, widget: string, i18n: true }
              - { label: "Body — before italic", name: body1, widget: text, i18n: true }
              - { label: "Body — after italic", name: body2, widget: text, i18n: true }
              - { label: "Another button text", name: another, widget: string, i18n: true }

      # ----- JOURNAL INDEX -----
      - name: journal-index
        label: "Journal Index Page"
        file: src/content/pages/journal-index.json
        i18n: true
        fields:
          - label: "SEO"
            name: seo
            widget: object
            fields:
              - { label: "Meta Title", name: title, widget: string, i18n: true }
              - { label: "Meta Description", name: description, widget: text, i18n: true }
              - { label: "OG Image", name: ogImage, widget: image, required: false, i18n: duplicate }
              - { label: "OG Image Alt Text", name: ogImageAlt, widget: string, required: false, i18n: true }
          - label: "Hero"
            name: hero
            widget: object
            fields:
              - { label: "Eyebrow", name: eyebrow, widget: string, i18n: true }
              - { label: "Title", name: titlePre, widget: string, i18n: true }
              - { label: "Lede", name: lede, widget: text, i18n: true }
          - label: "Labels"
            name: labels
            widget: object
            fields:
              - { label: "Read more", name: readMore, widget: string, i18n: true }
              - { label: "Back to Journal", name: backToJournal, widget: string, i18n: true }
              - { label: "Translation note (DE/IT only)", name: translationNote, widget: text, required: false, i18n: true }

  # ============================================================================
  # SITE SETTINGS
  # ============================================================================
  - name: site
    label: "Site Settings"
    files:
      - name: general
        label: "Brand, Nav, Footer, Social"
        file: src/content/site/general.json
        i18n: true
        fields:
          - label: "Brand"
            name: brand
            widget: object
            fields:
              - { label: "Site name", name: name, widget: string }
              - { label: "Wordmark — before dot", name: wordmarkBefore, widget: string }
              - { label: "Wordmark — after dot", name: wordmarkAfter, widget: string }
              - { label: "Tagline (used in footer)", name: tagline, widget: text, i18n: true }
              - { label: "Parent company name", name: parentCompany, widget: string }
              - { label: "Parent description prefix", name: parentDescription, widget: string, i18n: true }
              - { label: "Location (display)", name: location, widget: string, i18n: true }
              - { label: "Address", name: address, widget: string }
              - { label: "Email", name: email, widget: string }
              - { label: "Phone", name: phone, widget: string }
          - label: "Navigation labels"
            name: nav
            widget: object
            fields:
              - { label: "How it works", name: how, widget: string, i18n: true }
              - { label: "Pricing", name: pricing, widget: string, i18n: true }
              - { label: "Journal", name: journal, widget: string, i18n: true }
              - { label: "Apply", name: apply, widget: string, i18n: true }
          - label: "Primary CTAs (used across site)"
            name: cta
            widget: object
            fields:
              - { label: "Apply for a site", name: applyForSite, widget: string, i18n: true }
              - { label: "See how it works", name: seeHow, widget: string, i18n: true }
          - label: "Footer"
            name: footer
            widget: object
            fields:
              - { label: "Site column heading", name: siteHeading, widget: string, i18n: true }
              - { label: "Company column heading", name: companyHeading, widget: string, i18n: true }
              - { label: "Rights text", name: rights, widget: string, i18n: true }
              - { label: "Legal links text", name: legalLinks, widget: string, i18n: true }
          - label: "Social links"
            name: social
            widget: object
            fields:
              - { label: "LinkedIn URL", name: linkedin, widget: string, required: false }
              - { label: "Twitter URL", name: twitter, widget: string, required: false }
              - { label: "Instagram URL", name: instagram, widget: string, required: false }
          - label: "Schema.org metadata"
            name: schema
            widget: object
            collapsed: true
            fields:
              - { label: "Organization description", name: organizationDescription, widget: text, i18n: true }
              - { label: "Founding year", name: foundingYear, widget: number }

  # ============================================================================
  # ARTICLES (Journal entries)
  # ============================================================================
  - name: articles
    label: "Journal Articles"
    label_singular: "Article"
    folder: src/content/articles
    create: true
    delete: true
    identifier_field: slug
    extension: md
    format: yaml-frontmatter
    slug: "{{slug}}.{{lang}}"
    summary: "{{title}} · {{lang}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "URL Slug", name: slug, widget: string, hint: "Same across all languages — lowercase, hyphens" }
      - { label: "Language", name: lang, widget: select, options: ["en", "de", "it"], default: "en" }
      - { label: "Excerpt (1-2 sentences)", name: excerpt, widget: text }
      - { label: "Tag/category", name: tag, widget: string }
      - { label: "Publication date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, picker_utc: true }
      - { label: "Reading time", name: readingTime, widget: string, default: "5 min" }
      - { label: "Published", name: published, widget: boolean, default: true }
      - label: "SEO (optional override)"
        name: seo
        widget: object
        required: false
        collapsed: true
        fields:
          - { label: "Meta Title (defaults to article title)", name: title, widget: string, required: false }
          - { label: "Meta Description (defaults to excerpt)", name: description, widget: text, required: false }
          - { label: "OG Image", name: ogImage, widget: image, required: false }
          - { label: "OG Image Alt", name: ogImageAlt, widget: string, required: false }
      - { label: "Body", name: body, widget: markdown }

  # ============================================================================
  # PORTFOLIO
  # ============================================================================
  - name: portfolio
    label: "Portfolio"
    label_singular: "Property"
    folder: src/content/portfolio
    create: true
    delete: true
    identifier_field: title
    extension: json
    format: json
    summary: "{{title}}"
    fields:
      - { label: "Display order", name: order, widget: number, hint: "1 = first, 2 = second, etc." }
      - { label: "Tag (e.g. 'Group brand · 2024')", name: tag, widget: string, i18n: true }
      - { label: "Title", name: title, widget: string }
      - { label: "Subtitle (location, description)", name: subtitle, widget: string, i18n: true }
      - { label: "Image", name: image, widget: image, hint: "Recommended 800×1000px portrait" }
      - { label: "Image alt text", name: imageAlt, widget: string, i18n: true, hint: "Required for accessibility & SEO" }
      - { label: "External URL (optional)", name: url, widget: string, required: false }
