backend:
  name: github
  repo: marcorosso-labs/Astia-Web-Site
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: oauth/auth

media_folder: "public/images"
public_folder: "/images"

site_url: https://astiaweb.netlify.app
display_url: https://astiaweb.netlify.app
logo_url: https://astiaweb.netlify.app/favicon.svg

publish_mode: simple
slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: pages
    label: "Pages"
    label_singular: "Page"
