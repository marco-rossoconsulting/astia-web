<!DOCTYPE html>
<html>
<head><title>Form detection</title></head>
<body style="display:none;">
  <!--
    This file exists solely so Netlify’s build-time form parser detects the
    apply form. Astro’s minified output sometimes hides it from detection.
    Do not delete. Users never see this page.
  -->
  <form name="apply" method="POST" netlify netlify-honeypot="bot-field" action="/thank-you">
    <p style="display:none;">
      <label>Don't fill this out: <input name="bot-field" /></label>
    </p>
    <input type="text" name="propertyName" />
    <input type="text" name="propertyType" />
    <input type="text" name="rooms" />
    <input type="text" name="location" />
    <input type="url" name="website" />
    <input type="text" name="bookingEngine" />
    <textarea name="whatsBroken"></textarea>
    <textarea name="goal"></textarea>
    <input type="text" name="name" />
    <input type="text" name="role" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="hidden" name="lang" value="en" />
  </form>
</body>
</html>
